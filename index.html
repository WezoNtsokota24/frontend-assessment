<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Validation Tester</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }
        h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem; }
        input {
            width: 100%; padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px; box-sizing: border-box;
            font-size: 1rem; transition: border-color 0.15s ease-in-out;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        button {
            width: 100%; padding: 0.875rem;
            background-color: var(--primary); color: white;
            border: none; border-radius: 6px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: background-color 0.15s ease-in-out;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        .result-container {
            margin-top: 1.5rem; padding: 1rem;
            background: #1e293b; color: #38bdf8;
            border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem; white-space: pre-wrap; word-break: break-all;
            display: none; min-height: 60px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>API Validation Tester</h2>
    <form id="validationForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" value="wezontsokota02@gmail.com" required>
        </div>
        <div class="form-group">
            <label for="apiUrl">API Endpoint URL</label>
            <input type="url" id="apiUrl" value="https://wezo-ntsokota-developer-task.onrender.com/process-word" required>
        </div>
        <button type="submit" id="submitBtn">Run Validation</button>
    </form>
    
    <div id="resultBox" class="result-container"></div>
</div>

<script>
    document.getElementById('validationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const apiUrl = document.getElementById('apiUrl').value;
        const resultBox = document.getElementById('resultBox');
        const submitBtn = document.getElementById('submitBtn');
        
        
        const testUrl = `https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task?url=${encodeURIComponent(apiUrl)}&email=${encodeURIComponent(email)}`;

        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Validating...';
        resultBox.style.display = 'block';
        resultBox.style.color = '#94a3b8';
        resultBox.textContent = 'Awaiting response from Supabase...';

        try {
            const response = await fetch(testUrl);
            const text = await response.text();
            
            
            resultBox.style.color = response.ok ? '#4ade80' : '#f87171';
            
            
            try {
                resultBox.textContent = JSON.stringify(JSON.parse(text), null, 2);
            } catch {
                resultBox.textContent = text;
            }
        } catch (error) {
            resultBox.style.color = '#f87171';
            resultBox.textContent = `Network Error: Could not connect to the validation endpoint.\n\nDetails: ${error.message}`;
        } finally {
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Run Validation';
        }
    });
</script>

</body>
</html>
