<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Validation Terminal</title>
    <style>
        /* Black & White Theme */
        :root {
            --bg-color: #0a0a0a;
            --surface: #171717;
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
            --border: #333333;
            --accent: #ffffff;
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .terminal-card {
            background: var(--surface);
            padding: 3rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h2 { margin: 0; font-size: 1.25rem; font-weight: 500; letter-spacing: -0.025em; }
        p.subtitle { margin: 0.5rem 0 0 0; color: var(--text-muted); font-size: 0.875rem; }

        .form-group { margin-bottom: 1.5rem; }
        
        label { 
            display: block; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--text-muted); 
            margin-bottom: 0.5rem; 
        }

        input {
            width: 100%;
            padding: 0.875rem;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
            font-family: 'Fira Code', ui-monospace, monospace;
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 1px var(--accent); 
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: translateY(1px); }
        button:disabled { background-color: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* Loader Animation */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-color);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom JSON Output Styling */
        .output-wrapper {
            margin-top: 2rem;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        pre {
            background: var(--bg-color);
            padding: 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin: 0;
            font-family: 'Fira Code', ui-monospace, monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        /* Syntax Highlighting Colors */
        .string { color: #d4d4d4; }
        .number { color: #fff; font-weight: bold; }
        .boolean { color: #fff; font-weight: bold; }
        .null { color: #a3a3a3; font-style: italic; }
        .key { color: #fff; font-weight: 600; }

    </style>
</head>
<body>

<div class="terminal-card">
    <div class="header">
        <h2>Validation Console</h2>
        <p class="subtitle">API Endpoint Verification Task</p>
    </div>

    <form id="testerForm">
        <div class="form-group">
            <label>Developer Email</label>
            <input type="email" id="email" value="wezontsokota02@gmail.com" required>
        </div>
        
        <div class="form-group">
            <label>Deployed API Target</label>
            <input type="url" id="apiUrl" value="https://wezo-ntsokota-developer-task.onrender.com/process-word" required>
        </div>
        
        <button type="submit" id="submitBtn">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Execute Validation</span>
        </button>
    </form>

    <div class="output-wrapper" id="outputWrapper">
        <div class="output-header">
            <span><span class="status-dot" id="statusDot"></span>Response Data</span>
            <span id="statusCode"></span>
        </div>
        <pre id="resultBox"></pre>
    </div>
</div>

<script>
    
    function syntaxHighlight(json) {
        if (typeof json != 'string') {
             json = JSON.stringify(json, undefined, 2);
        }
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
            let cls = 'number';
            if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                    cls = 'key';
                } else {
                    cls = 'string';
                }
            } else if (/true|false/.test(match)) {
                cls = 'boolean';
            } else if (/null/.test(match)) {
                cls = 'null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    }

    document.getElementById('testerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const apiUrl = document.getElementById('apiUrl').value;
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const outputWrapper = document.getElementById('outputWrapper');
        const resultBox = document.getElementById('resultBox');
        const statusDot = document.getElementById('statusDot');
        const statusCode = document.getElementById('statusCode');
        
        const testUrl = `https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task?url=${encodeURIComponent(apiUrl)}&email=${encodeURIComponent(email)}`;

        
        submitBtn.disabled = true;
        btnText.textContent = 'Awaiting Supabase...';
        spinner.style.display = 'block';
        outputWrapper.style.display = 'none';

        try {
            const response = await fetch(testUrl);
            const text = await response.text();
            
            
            statusDot.style.backgroundColor = response.ok ? 'var(--success)' : 'var(--error)';
            statusCode.textContent = `STATUS: ${response.status}`;
            
            
            try {
                const jsonObj = JSON.parse(text);
                resultBox.innerHTML = syntaxHighlight(jsonObj);
            } catch {
                resultBox.textContent = text; // Fallback for raw text
            }
            
            outputWrapper.style.display = 'block';

        } catch (err) {
            statusDot.style.backgroundColor = 'var(--error)';
            statusCode.textContent = 'ERR_CONNECTION';
            resultBox.textContent = `Fetch Error: ${err.message}`;
            outputWrapper.style.display = 'block';
        } finally {
            
            submitBtn.disabled = false;
            btnText.textContent = 'Execute Validation';
            spinner.style.display = 'none';
        }
    });
</script>

</body>
</html>
